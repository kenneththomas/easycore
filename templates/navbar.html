{% macro render_navbar() %}
<nav class="navbar" aria-label="Primary navigation">
    <div class="nav-content">
        <a href="{{ url_for('index') }}" class="nav-logo" aria-label="Easycore home">
            <span class="nav-logo-mark" aria-hidden="true">e</span>
            <span>easycore</span>
        </a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-navigation">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-line" aria-hidden="true"></span>
            <span class="nav-toggle-line" aria-hidden="true"></span>
            <span class="nav-toggle-line" aria-hidden="true"></span>
        </button>

        <div class="nav-links" id="primary-navigation">
            <a href="{{ url_for('index') }}" class="nav-link">Library</a>
            <a href="{{ url_for('playlists') }}" class="nav-link">Playlists</a>
            <a href="{{ url_for('artists_index') }}" class="nav-link">Artists</a>

            <details class="nav-menu">
                <summary class="nav-menu-trigger">Tools</summary>
                <div class="nav-menu-panel">
                    <a href="{{ url_for('extract_mp3') }}">Extract MP3</a>
                </div>
            </details>

            <details class="nav-menu nav-menu-primary">
                <summary class="nav-menu-trigger">Add content</summary>
                <div class="nav-menu-panel">
                    <a href="{{ url_for('video.add_video') }}">Upload a file</a>
                    <a href="{{ url_for('bulk_upload') }}">Bulk upload videos</a>
                </div>
            </details>
        </div>
    </div>
</nav>

<link rel="stylesheet" href="{{ url_for('static', filename='css/global_player.css') }}">
<aside class="global-player" id="global-player" hidden aria-label="Music player">
    <audio id="global-player-audio" preload="metadata"></audio>
    <div class="global-player-art" id="global-player-art"><span aria-hidden="true">♪</span></div>
    <div class="global-player-copy">
        <a id="global-player-title" href="#">Nothing playing</a>
        <span id="global-player-artist">Choose a track</span>
    </div>
    <div class="global-player-controls">
        <button id="global-player-prev" type="button" aria-label="Previous track">|&lt;</button>
        <button id="global-player-toggle" class="global-player-main" type="button" aria-label="Play">▶</button>
        <button id="global-player-next" type="button" aria-label="Next track">&gt;|</button>
    </div>
    <div class="global-player-progress-wrap">
        <span id="global-player-current">0:00</span>
        <input id="global-player-progress" type="range" min="0" max="1000" value="0" aria-label="Track progress">
        <span id="global-player-duration">0:00</span>
    </div>
    <div class="global-player-actions">
        <button id="global-player-repeat" type="button" aria-label="Repeat mode" aria-pressed="false">↻</button>
        <button id="global-player-queue-toggle" type="button" aria-label="Show queue">Queue <span id="global-player-queue-count">0</span></button>
        <button id="global-player-close" type="button" aria-label="Close player">×</button>
    </div>
</aside>
<section class="global-queue" id="global-player-queue" hidden aria-label="Playback queue">
    <div class="global-queue-header">
        <div>
            <span>Up next</span>
            <h2>Queue</h2>
        </div>
        <button id="global-player-clear" type="button">Clear</button>
    </div>
    <div id="global-player-queue-list" class="global-queue-list"></div>
</section>
<script src="{{ url_for('static', filename='js/global_player.js') }}"></script>

<script>
    (() => {
        const nav = document.currentScript.previousElementSibling;
        const toggle = nav.querySelector('.nav-toggle');
        const links = nav.querySelector('.nav-links');

        toggle.addEventListener('click', () => {
            const isOpen = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', String(!isOpen));
            links.classList.toggle('is-open', !isOpen);
        });

        nav.querySelectorAll('.nav-menu').forEach((menu) => {
            menu.addEventListener('toggle', () => {
                if (!menu.open) return;
                nav.querySelectorAll('.nav-menu[open]').forEach((otherMenu) => {
                    if (otherMenu !== menu) otherMenu.removeAttribute('open');
                });
            });
        });

        document.addEventListener('click', (event) => {
            if (!nav.contains(event.target)) {
                nav.querySelectorAll('.nav-menu[open]').forEach((menu) => menu.removeAttribute('open'));
            }
        });
    })();
</script>
{% endmacro %}
